name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  gates:
    name: Release Gates (Rust + Extension + Analyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure checklist exists
        run: test -f docs/release-checklist.md

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run Tests
        run: cargo test --workspace --all-features

      - name: Build Debug Binary (for extension smoke tests)
        run: cargo build

      - name: Security Analyzer Sanity (static)
        run: cargo run --quiet --bin soroban-debug -- analyze --contract tests/fixtures/wasm/echo.wasm --format json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: VS Code Extension Install
        working-directory: extensions/vscode
        run: npm ci

      - name: VS Code Extension Compile
        working-directory: extensions/vscode
        run: npm run -s compile

      - name: VS Code Extension Tests
        working-directory: extensions/vscode
        env:
          SOROBAN_DEBUG_BIN: ${{ github.workspace }}/target/debug/soroban-debug
        run: npm test

      - name: Checklist link
        run: |
          echo "Release checklist: docs/release-checklist.md" >> "$GITHUB_STEP_SUMMARY"

  bench:
    name: Benchmark Sanity (thresholded)
    runs-on: ubuntu-latest
    needs: gates
    env:
      BENCH_WARN_PCT: 10
      BENCH_FAIL_PCT: 20
      BENCH_SAMPLE_SIZE: 20
      BENCH_MEASUREMENT_TIME: 5
      BENCH_WARMUP_TIME: 2
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Restore benchmark baseline (from cache)
        uses: actions/cache/restore@v4
        with:
          path: .bench/baseline.json
          key: bench-baseline-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            bench-baseline-${{ runner.os }}-

      - name: Run benchmarks (current)
        run: cargo bench --benches -- --noplot --sample-size $BENCH_SAMPLE_SIZE --measurement-time $BENCH_MEASUREMENT_TIME --warm-up-time $BENCH_WARMUP_TIME

      - name: Record current results (JSON)
        run: cargo run --quiet --bin bench-regression -- record --criterion target/criterion --out .bench/current.json

      - name: Compare against baseline (pass/warn/fail)
        shell: bash
        run: |
          set -e
          report="$(cargo run --quiet --bin bench-regression -- compare \
            --baseline .bench/baseline.json \
            --current .bench/current.json \
            --warn-pct "$BENCH_WARN_PCT" \
            --fail-pct "$BENCH_FAIL_PCT" \
            --annotate-top 20 \
            --max-rows 50 \
            --require-baseline false)"
          echo "$report"
          echo "$report" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [gates, bench]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: soroban-debug
            asset_name: soroban-debug-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: soroban-debug
            asset_name: soroban-debug-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: soroban-debug
            asset_name: soroban-debug-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: soroban-debug.exe
            asset_name: soroban-debug-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.asset_name }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-crate:
    name: Publish to crates.io
    needs: [build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "cargo_version=$CARGO_VERSION" >> $GITHUB_OUTPUT

      - name: Verify version consistency
        run: |
          if [ "${{ steps.version.outputs.tag_version }}" != "${{ steps.version.outputs.cargo_version }}" ]; then
            echo "Error: Tag version (${{ steps.version.outputs.tag_version }}) does not match Cargo.toml version (${{ steps.version.outputs.cargo_version }})"
            exit 1
          fi
          echo "Version consistency verified: ${{ steps.version.outputs.tag_version }}"

      - name: Validate package (dry-run)
        run: cargo publish --dry-run

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
